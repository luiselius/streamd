name: Bug Report
description: Report a bug or unexpected behavior in streamd.
title: "[BUG]: "
labels: ["bug", "needs triage"]
assignees: ["Gaurav-Gosain"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.

        Before submitting, please:
        - Make sure this issue has not already been reported.
        - Provide as much context as possible, including your platform, version, and steps to reproduce.
        - Attach logs or screenshots when applicable.

  - type: input
    id: bug-summary
    attributes:
      label: Brief Description
      description: A short description of the bug or issue.
      placeholder: ex. Markdown rendering breaks on code blocks with SSE input.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Select the platform or environment where the bug occurred.
      options:
        - Linux (x86_64)
        - Linux (arm64)
        - Linux (armv6)
        - Linux (armv7)
        - Linux (i386)
        - Darwin (arm64)
        - Darwin (x86_64)
        - FreeBSD (x86_64)
        - FreeBSD (arm64)
        - FreeBSD (i386)
        - Windows (x86_64)
        - Windows (i386)
      default: 0
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      description: How did you install streamd?
      options:
        - Bash Script (curl / wget)
        - Homebrew (macOS/Linux)
        - Arch Linux (AUR)
        - Go Install (go install ...)
        - Manual Build from Source
        - Other
      default: 0
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or Commit
      description: Enter the version tag (e.g. v0.1.0) or Git commit hash where the issue occurs.
      placeholder: ex. v0.1.0 or 3ba45ef
    validations:
      required: true

  - type: textarea
    id: current-behavior
    attributes:
      label: Current Behavior
      description: Describe what is currently happening.
      placeholder: ex. The output contains garbled ANSI sequences when piping from curl.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: Describe what you expected to happen instead.
      placeholder: ex. The output should render clean markdown in the terminal.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps To Reproduce
      description: Provide detailed steps to reproduce the issue.
      placeholder: |
        1. Run `curl -s ... | streamd`
        2. Observe error in output
    validations:
      required: true

  - type: textarea
    id: error-logs
    attributes:
      label: Error Logs
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Attach screenshots or images that help illustrate the issue.
      placeholder: Drag and drop images here or paste them directly.
    validations:
      required: false
